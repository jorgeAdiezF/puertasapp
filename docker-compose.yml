version: '3.9'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: puertasapp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       puertasapp
      POSTGRES_USER:     puertasapp
      POSTGRES_PASSWORD: puertasapp123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U puertasapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Adminer: interfaz web para PostgreSQL (solo desarrollo)
  adminer:
    image: adminer:latest
    container_name: puertasapp_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
